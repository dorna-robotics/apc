# apc — launch config.
#
# IN inventory: in_1 / in_2 are lists of 7 — index i is the number of
# discs stacked at anchor A(i+1) of that holder (0..225 each). Total
# discs = sum of both lists. Stacks are consumed top-first, A1→A7, in_1
# until empty, then in_2.
#
# Per disc: create at its inventory position → pick → inspect → place on
# anode → cathode down → read C → cathode up → pick → sort to out good/bad
# by the capacitance window (C_MIN..C_MAX in actions.py). Ordered drop:
# good fills out_good_1 then _2, bad fills out_bad_1; slots A1→A7, z steps
# by Z_STEP per disc, max MAX_PER_SLOT per slot. Every sorted disc is
# deleted right after it's placed; Start sweeps leftovers from killed runs.

project_name: apc
port:         5010
scene:        [scene/core_500.j2, scene/layout.j2]
recipes:      recipes.j2
actions:      actions.py
checks:       checks.py

plan_window:  4
scheduler:    cpsat

kwargs:
  in_1:
    type: list
    default: [1, 1, 1, 1, 1, 1, 1]
    label: in_1 discs per anchor
    hint: "[A1..A7] — index i = discs stacked at anchor A(i+1) of in_1 (0..225)."
  in_2:
    type: list
    default: [0, 0, 0, 0, 0, 0, 0]
    label: in_2 discs per anchor
    hint: "[A1..A7] — index i = discs stacked at anchor A(i+1) of in_2 (0..225)."
